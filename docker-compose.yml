services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    env_file:
      - .env
    environment:
      MINUTES_SERVICE_NAME: gateway
      MINUTES_REDIS_URL: redis://redis:6379/0
      MINUTES_DATABASE_URL: sqlite:///data/app/app.db
      MINUTES_STORAGE_ROOT: /app/data/app
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - minutes_data:/app/data/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    env_file:
      - .env
    environment:
      MINUTES_SERVICE_NAME: orchestrator
      MINUTES_REDIS_URL: redis://redis:6379/0
      MINUTES_DATABASE_URL: sqlite:///data/app/app.db
      MINUTES_STORAGE_ROOT: /app/data/app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - minutes_data:/app/data/app
    command: ["bash", "scripts/run-orchestrator.sh"]

  inference-worker:
    build:
      context: .
      dockerfile: docker/inference-worker.Dockerfile
    env_file:
      - .env
    environment:
      MINUTES_SERVICE_NAME: inference-worker
      MINUTES_REDIS_URL: redis://redis:6379/0
      MINUTES_DATABASE_URL: sqlite:///data/app/app.db
      MINUTES_STORAGE_ROOT: /app/data/app
      MINUTES_STT_BASE_URL: http://funasr-server:8000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - minutes_data:/app/data/app
    command: ["bash", "scripts/run-inference-worker.sh"]

volumes:
  minutes_data:

